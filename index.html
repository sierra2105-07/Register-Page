<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="stylesheet" href="style_r.css">
</head>
<body>
    <div class="reg-card">
        
        <!--Profile image-->
        <div class="pfp">
            <img src="./smiski2.jpg" alt="Profile">
        </div>

        <!--Form register-->
        <div>
            <!--Username-->
            <div class="field">
                <label for="">Username</label>
                <input type="text">
            </div>
            <!--Password-->
            <div class="field">
                <label for="">Password</label>
                <input type="text">
            </div>
            <!--Phone Number-->
            <div class="phone-gender"> 
                <div class="field-phone">
                    <label for="">Phone Number</label>
                    <input type="text">
                </div>

            <!--Gender-->
                <div class="field-gender">
                    <label for="">Gender</label>
                    <input type="text">
                </div>
            </div>
            
                

            <button class="bt-rg">Register</button>
            <button class="bt-btlg">Back to login</button>
            
        </div>
    </div>
</body>
</html>
